services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: ml-decode-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: MONGODB_URL
        sync: false          # Set in Render dashboard – do NOT commit real value
      - key: DB_NAME
        value: media_verification_db
      - key: SECRET_KEY
        generateValue: true  # Render generates a random secret
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ADMIN_REGISTER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false          # Set to your frontend Render URL

  # ─── Frontend (React + Vite) ──────────────────────────────────────────────
  - type: static
    name: ml-decode-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to https://ml-decode-backend.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
